<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebNova</title>
    <!-- <script src="https://cdn.tailwindcss.com"></script> -->
    <script src="https://unpkg.com/ionicons@4.5.10-0/dist/ionicons.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div
      class="relative flex flex-col text-white px-5 lg:px-20 bg-no-repeat bg-cover bg-center min-h-[100dvh] lg:min-h-screen"
      style="background-image: url(./assest/backgroundImage.jpg)"
    >
      <div class="absolute inset-0 bg-black/80"></div>
      <section
        class="relative z-10 flex justify-between items-center w-[92%] mx-auto py-4"
      >
        <span class="text-white text-[25px] font-bold">WebNova</span>
        <div
          class="nav-links md:static absolute min-h-[60vh] md:min-h-fit left-0 top-20 w-full md:w-auto hidden md:flex items-center px-5"
        >
          <ul class="flex md:flex-row flex-col md:items-center md:gap-8 gap-10">
            <li class="">
              <a class="hover:text-gray-500" href="#home">Home</a>
            </li>
            <li class=""><a href="#features">About us</a></li>
            <li class=""><a href="#pricing">Services</a></li>
            <li class=""><a href="#waitlist">Digital Products</a></li>
            <!-- <li class="text-center my-5 mx-0"><a href="#waitlist">Digital Products</a></li> -->
          </ul>
        </div>
        <div class="flex items-center gap-6">
          <button class="rounded-md px-4 lg:px-6 py-2 bg-[#133e94]">
            Get Started
          </button>

          <ion-icon
            onclick="onToggleMenu(this)"
            name="menu"
            class="text-3xl cursor-pointer md:hidden"
          ></ion-icon>
        </div>
      </section>
      <section id="hero" class="flex flex-grow justify-center items-center">
        <div class="relative z-10">
          <div class="flex flex-col gap-2 justify-center items-center">
            <!-- border: 1px solid; -->

            <!-- border-image-source: linear-gradient(195.8deg, #3176FF 11.63%, #152139 23.24%); -->
            <!-- bg-gradient-to-r  from-[#152139] to-[#3176FF] -->

            <p
              class="text-[12px] md:text-base px-5 lg:px-7 py-3 border rounded-full bg-gradient-to-r from-[#152139] to-[#3176FF] bg-[linear-gradient(195.8deg, #3176FF_11.63%, #152139_23.24%)] bg-transparent"
            >
              Welcome to WebNova
            </p>
            <h1 class="text-[30px] md:text-[90px] text-center leading-relaxed">
              We help businesses to have great impact
              <span
                class="p-2 border border-white rounded-md bg-gradient-to-r from-white/0 from-0% to-[#152139BD]/75 to-100%"
                ><em>online</em></span
              >
            </h1>
            <p class="mt-2 text-center text-wrap max-w-md">
              We are a digital agency that ideates, designs, and develops
              powerful software. Leap into the future with a team trusted by the
              biggest brands.
            </p>
            <!-- <p class="text-center"> -->

            <!-- </p> -->
            <div class="cta flex justify-center items-center gap-2">
              <button
                class="border border-white rounded-md px-4 lg:px-6 py-2 bg-[#133e94]"
              >
                Our Services</button
              ><button
                class="border border-white rounded-md px-4 lg:px-6 py-2 backdrop-blur-2xl supports-backdrop-filter:bg-white/80 bg-white/10"
              >
                Frontend Training
              </button>
            </div>
          </div>
        </div>
      </section>
    </div>
    <script>
      const navLinks = document.querySelector(".nav-links");
      function onToggleMenu(e) {
        e.name = e.name === "menu" ? "close" : "menu";
        navLinks.classList.toggle("hidden");
      }
    </script>
  </body>
</html>
