<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="WebNova is an agency that develops powerful software for businesse"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebNova</title>
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./favicon-16x16.png"
    />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/ionicons@4.5.10-0/dist/ionicons.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div
      class="font-[inter] relative flex flex-col text-white px-5 lg:px-15 bg-no-repeat bg-cover bg-center min-h-[100dvh] lg:min-h-screen"
      style="background-image: url(./assest/backgroundImage.jpg)"
    >
      <div class="absolute inset-0 bg-black/80"></div>
      <section
        class="relative z-10 flex justify-between items-center w-[92%] mx-auto py-4"
      >
        <span class="text-white text-[25px] lg:text-[30px] font-bold"
          >WebNova</span
        >
        <div
          class="nav-links backdrop-blur-md lg:backdrop-blur-none bg-white/10 lg:bg-transparent z-50 lg:z-0 lg:static fixed min-h-screen lg:min-h-fit right-0 top-0 py-20 lg:py-5 w-1/2 lg:w-auto hidden lg:flex items-center px-5"
        >
          <ul
            id="menu"
            class="text-[18px] lg:text-xl flex lg:flex-row flex-col items-center justify-center lg:gap-10 gap-5 py-10 lg:py-0"
          >
            <li class="relative">
              <a
                class="after:absolute after:content-[''] after:left-0 after:bottom-[-4px] after:h-[2px] after:w-[100%] after:bg-white after:transition-transform after:duration-300 after:ease-in-out after:origin-left after:scale-x-0 hover:after:scale-x-100"
                href="#hero"
                >Home</a
              >
            </li>
            <li class="relative">
              <a
                class="after:absolute after:content-[''] after:left-0 after:bottom-[-4px] after:h-[2px] after:w-[100%] after:bg-white after:transition-transform after:duration-300 after:ease-in-out after:origin-left after:scale-x-0 hover:after:scale-x-100"
                href="#"
                >About us</a
              >
            </li>
            <li class="relative">
              <a
                class="after:absolute after:content-[''] after:left-0 after:bottom-[-4px] after:h-[2px] after:w-[100%] after:bg-white after:transition-transform after:duration-300 after:ease-in-out after:origin-left after:scale-x-0 hover:after:scale-x-100"
                href="#"
                >Services</a
              >
            </li>
            <li class="relative">
              <a
                class="after:absolute after:content-[''] after:left-0 after:bottom-[-4px] after:h-[2px] after:w-[100%] after:bg-white after:transition-transform after:duration-300 after:ease-in-out after:origin-left after:scale-x-0 hover:after:scale-x-100"
                href="#"
                >Digital Products</a
              >
            </li>
            <button
              class="rounded-md px-4 lg:px-6 py-2 bg-[#133e94] hover:bg-[#08245c] w-full lg:hidden"
            >
              Get Started
            </button>
          </ul>
        </div>
        <div>
          <button
            class="rounded-md px-4 lg:px-6 py-2 bg-[#133e94] hover:bg-[#08245c] hidden lg:block"
          >
            Get Started
          </button>

          <ion-icon
            onclick="onToggleMenu(this)"
            name="menu"
            class="relative z-50 text-3xl cursor-pointer lg:hidden"
          ></ion-icon>
        </div>
      </section>
      <section
        id="hero"
        class="relative flex flex-grow justify-center items-center lg:py-40"
      >
        <div class=" ">
          <div class="flex flex-col gap-2 justify-center items-center">
            <p
              class="font-semibold lg:m-0 text-[12px] lg:text-base px-5 lg:px-7 py-3 border rounded-full bg-gradient-to-r from-[#152139] to-[#3176FF] bg-[linear-gradient(195.8deg, #3176FF_11.63%, #152139_23.24%)] bg-transparent"
            >
              Welcome to WebNova
            </p>
            <h1
              class="text-[30px] lg:text-[70px] lg:max-w-4xl text-center leading-normal lg:leading-tight lg:tracking-tighter"
            >
              We help businesses to have great impact
              <span
                class="p-2 lg:px-2 lg:py-0 lg:inline-block lg:text-center border border-white rounded-md bg-gradient-to-r from-white/0 from-0% to-[#152139BD]/75 to-100%"
                ><em>online</em></span
              >
            </h1>
            <p class="mt-2 text-center text-wrap max-w-md">
              We are a digital agency that ideates, designs, and develops
              powerful software. Leap into the future with a team trusted by the
              biggest brands.
            </p>

            <div class="cta flex justify-center items-center gap-2">
              <button
                class="border border-white rounded-md px-4 lg:px-6 py-2 bg-[#133e94] hover:bg-[#08245c]"
              >
                Our Services</button
              ><button
                class="border border-white rounded-md px-4 lg:px-6 py-2 backdrop-blur-2xl supports-backdrop-filter:bg-white/80 bg-white/10"
              >
                Frontend Training
              </button>
            </div>
          </div>
        </div>
      </section>
    </div>
    <script>
      // const navLinks = document.querySelector(".nav-links");
      // function onToggleMenu(e) {
      //   e.name = e.name === "menu" ? "close" : "menu";
      //   navLinks.classList.toggle("hidden");
      // }

      // const links = document.querySelectorAll("#menu a");
      // links.forEach((link) => {
      //   link.addEventListener("click", () => {
      //     navLinks.classList.add("hidden");
      //   });
      // });
      const navLinks = document.querySelector(".nav-links");
      const links = document.querySelectorAll("#menu a");
      let menuIcon = null;

      function onToggleMenu(icon) {
        menuIcon = icon;

        const isOpen = !navLinks.classList.contains("hidden");

        navLinks.classList.toggle("hidden");

        icon.name = isOpen ? "menu" : "close";
      }

      links.forEach((link) => {
        link.addEventListener("click", () => {
          navLinks.classList.add("hidden");

          if (menuIcon) {
            menuIcon.name = "menu";
          }
        });
      });
    </script>
  </body>
</html>
